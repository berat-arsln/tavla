
<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Türk Tavlası</title>

    <!-- CSS -->
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/board.css">
    <link rel="stylesheet" href="css/game.css">
    <link rel="stylesheet" href="css/profile.css">
    <link rel="stylesheet" href="css/chat.css">
    <link rel="stylesheet" href="css/settings.css">
    <link rel="stylesheet" href="css/responsive.css">
</head>

<body>

    <!-- Bildirimler -->
    <div id="notification-container"></div>

    <!-- Uygulama -->
    <div id="app">

        <!-- Ana Menü -->
        <section id="main-menu" class="screen active">

            <header class="main-header">
                <h1>Türk Tavlası</h1>
                <button id="notification-btn">🔔</button>
            </header>

            <div class="menu-buttons">

                <button id="online-play-btn">
                    🎲 Online Oyna
                </button>

                <button id="ai-play-btn">
                    🤖 AI'ya Karşı Oyna
                </button>

                <button id="local-play-btn">
                    📱 Yerel Oyna
                </button>

                <button id="profile-btn">
                    👤 Profil
                </button>

                <button id="settings-btn">
                    ⚙️ Ayarlar
                </button>

            </div>

        </section>

        <!-- Profil -->
        <section id="profile-screen" class="screen hidden">

            <header class="screen-header">
                <button class="back-btn">←</button>
                <h2>Profil</h2>
            </header>

            <div id="profile-info">

                <div class="profile-card">

                    <div class="avatar">
                        👤
                    </div>

                    <h3 id="display-name">
                        Görünen Ad
                    </h3>

                    <p id="username">
                        @kullanici
                    </p>

                    <p id="elo-rating">
                        ELO: 1000
                    </p>

                    <p id="rank-title">
                        Oyuncu
                    </p>

                </div>

            </div>

            <div class="profile-actions">

                <button id="create-profile-btn">
                    Yeni Profil
                </button>

                <button id="switch-profile-btn">
                    Profil Değiştir
                </button>

                <button id="delete-profile-btn">
                    Profil Sil
                </button>

            </div>

        </section>

        <!-- Arkadaşlar -->
        <section id="friends-screen" class="screen hidden">

            <header class="screen-header">
                <button class="back-btn">←</button>
                <h2>Arkadaşlar</h2>
            </header>

            <input
                type="text"
                id="friend-search"
                placeholder="@kullaniciadi">

            <button id="friend-search-btn">
                Ara
            </button>

            <div id="friend-search-results"></div>

            <div id="friend-requests"></div>

            <div id="friend-list"></div>

        </section>

        <!-- Liderlik Tablosu -->
        <section id="leaderboard-screen" class="screen hidden">

            <header class="screen-header">
                <button class="back-btn">←</button>
                <h2>Sıralama</h2>
            </header>

            <div id="leaderboard-list"></div>

        </section>

        <!-- Online Oyun -->
        <section id="online-screen" class="screen hidden">

            <header class="screen-header">
                <button class="back-btn">←</button>
                <h2>Online Oyna</h2>
            </header>

            <button id="create-room-btn">
                Oda Oluştur
            </button>

            <button id="join-room-btn">
                Oda Koduyla Katıl
            </button>

            <button id="friend-invite-btn">
                Arkadaş Davet Et
            </button>

        </section>

        <!-- AI Oyna -->
        <section id="ai-screen" class="screen hidden">

            <header class="screen-header">
                <button class="back-btn">←</button>
                <h2>AI Modu</h2>
            </header>

            <div class="difficulty-list">

                <button data-difficulty="beginner">
                    Başlangıç
                </button>

                <button data-difficulty="medium">
                    Orta
                </button>

                <button data-difficulty="hard">
                    Zor
                </button>

                <button data-difficulty="legend">
                    Efsane
                </button>

            </div>

        </section>

        <!-- Yerel Oyun -->
        <section id="local-screen" class="screen hidden">

            <header class="screen-header">
                <button class="back-btn">←</button>
                <h2>Yerel Oyun</h2>
            </header>

            <input
                type="text"
                id="player1-name"
                placeholder="Oyuncu 1">

            <input
                type="text"
                id="player2-name"
                placeholder="Oyuncu 2">

            <button id="start-local-game">
                Oyunu Başlat
            </button>

        </section>

        <!-- Ayarlar -->
        <section id="settings-screen" class="screen hidden">

            <header class="screen-header">
                <button class="back-btn">←</button>
                <h2>Ayarlar</h2>
            </header>

            <div class="settings-group">

                <h3>Oyun Ayarları</h3>

                <label>
                    Taş Hareketi
                    <select id="move-mode">
                        <option value="tap">
                            Dokun
                        </option>
                        <option value="drag">
                            Sürükle Bırak
                        </option>
                    </select>
                </label>

                <label>
                    Zar Sistemi
                    <select id="dice-mode">
                        <option value="auto">
                            Otomatik
                        </option>
                        <option value="manual">
                            Manuel
                        </option>
                    </select>
                </label>

                <label>
                    Tahta Görünümü
                    <select id="board-view">
                        <option value="player">
                            Kendi Tarafım
                        </option>
                        <option value="shared">
                            Ortak Görünüm
                        </option>
                    </select>
                </label>

            </div>

            <div class="settings-group">

                <h3>Tema</h3>

                <button id="light-theme">
                    Açık Mod
                </button>

                <button id="dark-theme">
                    Koyu Mod
                </button>

            </div>

            <div class="settings-group">

                <h3>Ses</h3>

                <input
                    type="range"
                    min="0"
                    max="100"
                    value="100"
                    id="volume-slider">

            </div>

            <div class="settings-group">

                <h3>Nasıl Oynanır?</h3>

                <button id="rules-btn">
                    Kuralları Aç
                </button>

            </div>

            <div class="settings-group">

                <p id="version">
                    v1.0.0
                </p>

            </div>

        </section>

        <!-- Oyun Ekranı -->
        <section id="game-screen" class="screen hidden">

            <header id="game-header">

                <div id="player-top"></div>

                <div id="game-info">

                    <span id="score-display">
                        0 - 0
                    </span>

                    <span id="timer-display">
                        00:00
                    </span>

                </div>

                <div id="player-bottom"></div>

            </header>

            <main id="game-layout">

                <div id="board-container">

                    <div id="board">
                        <!-- Tahta boardUI.js tarafından üretilecek -->
                    </div>

                </div>

            </main>

            <footer id="game-controls">

                <button id="roll-dice-btn">
                    Zar At
                </button>

                <button id="undo-btn">
                    Geri Al
                </button>

                <button id="finish-turn-btn">
                    Hamleyi Bitir
                </button>

                <button id="menu-btn">
                    ☰
                </button>

            </footer>

        </section>

        <!-- Sohbet Paneli -->
        <aside id="chat-panel" class="hidden">

            <div id="chat-messages"></div>

            <input
                type="text"
                id="chat-input"
                placeholder="Mesaj yaz...">

            <button id="send-chat-btn">
                Gönder
            </button>

        </aside>

        <!-- Hamle Geçmişi -->
        <aside id="history-panel" class="hidden">

            <h3>Hamle Geçmişi</h3>

            <div id="history-list"></div>

        </aside>

    </div>

    <!-- JavaScript -->
    <script type="module" src="js/app.js"></script>

</body>
</html>
