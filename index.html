<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    >

    <title>Türk Tavlası</title>

    <meta
        name="description"
        content="Firebase destekli çevrim içi Türk Tavlası"
    >

    <meta
        name="theme-color"
        content="#1f2937"
    >

    <!-- CSS -->
    <link rel="stylesheet" href="./css/main.css">
    <link rel="stylesheet" href="./css/board.css">
    <link rel="stylesheet" href="./css/game.css">
    <link rel="stylesheet" href="./css/profile.css">
    <link rel="stylesheet" href="./css/chat.css">
    <link rel="stylesheet" href="./css/settings.css">
    <link rel="stylesheet" href="./css/responsive.css">
</head>

<body class="theme-light">

    <!-- APP ROOT -->
    <div
        id="app-root"
        class="app app--loading"
    >

        <!-- TOP BAR -->
        <header
            id="top-bar"
            class="top-bar"
        >

            <div class="top-bar__player">
                <span id="player-one-name">
                    Oyuncu 1
                </span>
            </div>

            <div class="top-bar__score">
                <span id="match-score">
                    0 - 0
                </span>
            </div>

            <div class="top-bar__timer">
                <span id="turn-timer">
                    --:--
                </span>
            </div>

            <div class="top-bar__status">
                <span id="connection-status">
                    Çevrimdışı
                </span>
            </div>

            <div class="top-bar__player">
                <span id="player-two-name">
                    Oyuncu 2
                </span>
            </div>

        </header>

        <!-- MAIN LAYOUT -->
        <main class="layout">

            <!-- BOARD AREA -->
            <section
                class="layout__board"
                aria-label="Oyun Tahtası"
            >

                <div
                    id="board-container"
                    class="board board--self"
                >

                    <!-- Dice Area -->
                    <div
                        id="dice-area"
                        class="dice"
                    >
                        <div class="dice__item">
                            <span class="dice__value">-</span>
                        </div>

                        <div class="dice__item">
                            <span class="dice__value">-</span>
                        </div>
                    </div>

                    <!-- Board Render Target -->
                    <div
                        id="board-render-area"
                        aria-label="Tavla Tahtası"
                    ></div>

                </div>

            </section>

            <!-- SIDEBAR -->
            <aside
                class="layout__sidebar"
                aria-label="Yan Paneller"
            >

                <!-- HISTORY PANEL -->
                <section
                    id="history-panel"
                    class="panel panel--closed history-panel"
                >

                    <h2>
                        Hamle Geçmişi
                    </h2>

                    <div
                        class="history-panel__list"
                        id="history-list"
                    ></div>

                </section>

                <!-- CHAT PANEL -->
                <section
                    id="chat-panel"
                    class="panel panel--closed chat-panel"
                >

                    <h2>
                        Sohbet
                    </h2>

                    <div
                        class="chat-panel__messages"
                        id="chat-messages"
                    ></div>

                    <div class="chat-panel__input">

                        <input
                            type="text"
                            id="chat-input"
                            maxlength="250"
                            placeholder="Mesaj yaz..."
                            aria-label="Mesaj Yaz"
                        >

                        <button
                            id="chat-send-button"
                            class="btn btn--primary"
                            aria-label="Mesaj Gönder"
                        >
                            Gönder
                        </button>

                    </div>

                </section>

                <!-- SETTINGS PANEL -->
                <section
                    id="settings-panel"
                    class="panel panel--closed settings-panel"
                >

                    <h2>
                        Ayarlar
                    </h2>

                    <div id="settings-content"></div>

                </section>

            </aside>

        </main>

        <!-- BOTTOM BAR -->
        <footer
            id="bottom-bar"
            class="bottom-bar"
        >

            <button
                id="roll-dice-button"
                class="btn btn--primary bottom-bar__button"
                aria-label="Zar At"
            >
                Zar At
            </button>

            <button
                id="undo-button"
                class="btn btn--secondary bottom-bar__button"
                aria-label="Geri Al"
            >
                Geri Al
            </button>

            <button
                id="end-turn-button"
                class="btn btn--success bottom-bar__button"
                aria-label="Hamleyi Bitir"
            >
                Hamleyi Bitir
            </button>

        </footer>

        <!-- MOBILE MENU -->
        <button
            id="mobile-menu-button"
            class="mobile-menu mobile-menu--closed"
            aria-label="Menüyü Aç"
        >
            ⋮
        </button>

    </div>

    <!-- DIALOG LAYER -->
    <div
        id="dialog-layer"
        aria-live="polite"
    ></div>

    <!-- NOTIFICATION LAYER -->
    <div
        id="notification-layer"
        aria-live="polite"
    ></div>

    <!-- APP ENTRY -->
    <script
        type="module"
        src="./js/app.js"
    ></script>

</body>
</html>
